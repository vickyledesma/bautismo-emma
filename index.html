<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bautismo - Emma Lujan</title>
  <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:wght@300;400;500;600&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

  <!-- Partículas -->
  <div class="particles">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <!-- Giraffe background -->
  <div class="giraffe-bg"></div>

  <!-- Brush strokes -->
  <svg class="brush-top" viewBox="0 0 420 220" fill="none" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="80" cy="60" rx="160" ry="90" fill="#c8a96e" opacity="0.18" transform="rotate(-18 80 60)"/>
    <ellipse cx="320" cy="30" rx="120" ry="60" fill="#b5705b" opacity="0.10" transform="rotate(10 320 30)"/>
    <ellipse cx="30" cy="140" rx="90" ry="40" fill="#c8a96e" opacity="0.13" transform="rotate(-25 30 140)"/>
  </svg>


  <!-- Foliage left -->
  <svg class="foliage-left" viewBox="0 0 110 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M55 180 C40 150 10 130 20 100 C30 75 60 80 55 50 C50 25 30 15 40 5" stroke="#c8a96e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <ellipse cx="28" cy="105" rx="22" ry="13" fill="#c8a96e" opacity="0.55" transform="rotate(-35 28 105)"/>
    <ellipse cx="48" cy="70" rx="20" ry="11" fill="#b5705b" opacity="0.45" transform="rotate(20 48 70)"/>
    <ellipse cx="38" cy="140" rx="18" ry="10" fill="#c8a96e" opacity="0.40" transform="rotate(-50 38 140)"/>
    <ellipse cx="22" cy="80" rx="16" ry="9" fill="#d4b896" opacity="0.50" transform="rotate(10 22 80)"/>
    <ellipse cx="55" cy="45" rx="15" ry="8" fill="#c8a96e" opacity="0.38" transform="rotate(30 55 45)"/>
    <ellipse cx="32" cy="120" rx="12" ry="7" fill="#b5705b" opacity="0.35" transform="rotate(-20 32 120)"/>
  </svg>

  <!-- Foliage right -->
  <svg class="foliage-right" viewBox="0 0 95 180" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M45 170 C35 140 8 120 18 90 C28 65 55 70 50 40 C46 18 28 10 36 2" stroke="#c8a96e" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <ellipse cx="22" cy="95" rx="20" ry="11" fill="#c8a96e" opacity="0.50" transform="rotate(-35 22 95)"/>
    <ellipse cx="40" cy="62" rx="18" ry="10" fill="#b5705b" opacity="0.42" transform="rotate(20 40 62)"/>
    <ellipse cx="30" cy="128" rx="16" ry="9" fill="#c8a96e" opacity="0.38" transform="rotate(-50 30 128)"/>
  </svg>

  <div class="inner">

    <!-- Cruz (sin paloma) -->
    <div class="symbol">
      <svg width="52" height="72" viewBox="0 0 52 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="22" y="0" width="8" height="72" rx="2" fill="url(#goldGrad2)" opacity="0.9"/>
        <rect x="4" y="20" width="44" height="8" rx="2" fill="url(#goldGrad2)" opacity="0.9"/>
        <defs>
          <linearGradient id="goldGrad2" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#d4b896"/>
            <stop offset="100%" stop-color="#b5705b"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <!-- Quote -->
    <p class="quote">
      La luz de Dios se enciende hoy en mi<br>
      corazón para iluminar todo el camino<br>
      de mi vida
    </p>

    <!-- Name -->
    <h1 class="name">Emma Lujan</h1>

    <!-- Tagline -->
    <p class="tagline">Acompáñame a recibir el<br>Sacramento del Bautismo</p>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>

    <!-- Date -->
    <div class="date-block">
      <div class="date-part">
        <span class="label">Dom</span>
      </div>
      <div class="date-sep"></div>
      <div class="date-part">
        <span class="label">Mayo</span>
        <span class="date-num" style="font-size:46px;color:var(--rose-gold);">31</span>
      </div>
      <div class="date-sep"></div>
      <div class="date-part">
        <span class="value">2026</span>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider" style="margin-bottom:24px;">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>

    <!-- Padrinos -->
    <div class="info-section">
      <p class="info-title">Padrinos:</p>
      <div class="info-body">
        Yesica Lujan<br>
        Juan Buena
      </div>
    </div>

    <!-- Misa -->
    <div class="info-section">
      <p class="info-title">Misa 11:00 a.m.</p>
      <div class="info-body">
        <span class="venue">"Iglesia Santa Lucia"</span>
        <a class="link" href="https://www.google.com/maps/place/Lavalle+2650,+G4200+Santiago+del+Estero/@-27.8170532,-64.2813149,17z/data=!3m1!4b1!4m6!3m5!1s0x943b4d9ab2745adb:0x648e7b0350ce9a5!8m2!3d-27.817058!4d-64.27874!16s%2Fg%2F11jyd1___p?entry=ttu&g_ep=EgoyMDI2MDUxMy4wIKXMDSoASAFQAw%3D%3D" target="_blank">Lavalle 2650</a>
      </div>
    </div>

    <!-- RSVP -->
    <a class="rsvp" href="https://wa.me/5493854753231?text=Hola!%20confirmo%20mi%20asistencia%20al%20bautismo%20de%20Emma" target="_blank">Confirma tu asistencia <span>aquí</span></a>

  </div>
</div>

</body>
</html>
